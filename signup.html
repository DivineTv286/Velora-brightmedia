<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="apple-touch-icon" href="assets/favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora | Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-area">
            <img src="logo.png" alt="Velora Logo" class="logo-img"> 
        </div>
        
        <div class="nav-actions">
            <div class="hamburger" id="menu-toggle">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <nav class="mobile-nav" id="mobile-menu">
            <div class="menu-links">
                <a href="index.html">Home</a>
                <a href="index.html#about-section">About</a>
                <a href="index.html#features-section">Ecosystem</a>
                <a href="index.html#pricing-section">Pricing</a>
            </div>
             <div class="menu-auth">
                <a href="login.html" class="login-link">LOGIN</a>
                <a href="signup.html" class="signup-btn-large">JOIN NOW</a>
            </div>
        </nav>
    </header>

    <main class="content-container">
        
        <section class="signup-intro">
            <h1 class="main-title">Create Account</h1>
            <p class="subtitle">Join the Velora ecosystem today.</p>
        </section>

        <form class="signup-form">
            
            <div class="input-wrapper">
                <label for="full-name" class="input-label">FULL NAME</label>
                <div class="input-group">
                    <span class="input-icon"><i class="fa-regular fa-user"></i></span>
                    <input type="text" id="full-name" name="full-name" placeholder="John Doe" required>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="username" class="input-label">USERNAME</label>
                <div class="input-group">
                    <span class="input-icon"><i class="fa-solid fa-user-plus"></i></span>
                    <input type="text" id="username" name="username" placeholder="@velora_creator" required>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="email" class="input-label">EMAIL ADDRESS</label>
                <div class="input-group">
                    <span class="input-icon"><i class="fa-regular fa-envelope"></i></span>
                    <input type="email" id="email" name="email" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="input-wrapper">
                <label for="password" class="input-label">PASSWORD</label>
                <div class="input-group">
                    <span class="input-icon"><i class="fa-solid fa-lock"></i></span>
                    <input type="password" id="password" name="password" placeholder="........." required>
                    <span class="password-toggle" id="togglePassword" style="cursor: pointer; padding-right: 20px; color: #666;">
                        <i class="fa-regular fa-eye" id="eyeIcon"></i>
                    </span>
                </div>
            </div>

            <div class="input-wrapper">
                <label class="input-label">SELECT ACCESS TIER (VELORA NETWORKS)</label>
                <div class="plan-cards-container">
                    
                    <div class="plan-card active" data-plan-value="VELORA PLATINUM — ₦9,000">
                        <div class="plan-card-icon">
                            <i class="fa-solid fa-layer-group"></i>
                        </div>
                        <div class="plan-card-details">
                            <h3>VELORA PLATINUM</h3>
                            <p class="plan-save-tag">Save Entry Fee — ₦9,000</p>
                        </div>
                        <div class="plan-checkbox">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    </div>

                    <div class="plan-card" data-plan-value="VELORA PREMIUM — ₦14,500">
                        <div class="plan-card-icon">
                            <i class="fa-solid fa-crown"></i>
                        </div>
                        <div class="plan-card-details">
                            <h3>VELORA PREMIUM</h3>
                            <p class="plan-save-tag">Save Entry Fee — ₦14,500</p>
                        </div>
                        <div class="plan-checkbox">
                            <i class="fa-solid fa-circle-check"></i>
                        </div>
                    </div>

                </div>
                <input type="hidden" id="selected-plan-tracker" name="plan" value="VELORA PLATINUM — ₦9,000">
            </div>

            <button type="submit" class="velora-submit-btn">
                Create Account 
                <span class="btn-arrow-icon"><i class="fa-solid fa-arrow-right-long"></i></span>
            </button>
        
        </form>

        <div class="form-footer">
            <p class="terms-text">By creating your account, you agree to our <a href="terms.html" class="legal-link">Terms of Service</a> and <a href="privacy.html" class="legal-link">Privacy Policy</a>.</p>
            <p class="login-prompt">Already have an account? <a href="login.html" class="login-action-link">Login</a></p>
        </div>

    </main>

    <style>
        :root {
            --velora-primary: #6366f1;
            --velora-accent: #a855f7;
            --velora-glow: rgba(99, 102, 241, 0.4);
            --dark-bg: #0b0a12;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            background: radial-gradient(circle at top right, #1e1b4b 0%, #0b0a12 65%);
            color: #fff;
            padding-top: 100px; 
            line-height: 1.5;
            min-height: 100vh;
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background-color: rgba(11, 10, 18, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 2000;
        }

        .logo-img {
            height: 32px;
            width: auto;
            object-fit: contain;   
        }

        .hamburger {
            cursor: pointer;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .bar {
            width: 28px;
            height: 2px;
            background-color: #fff;
            transition: all 0.3s ease;
        }

        .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); background-color: var(--velora-primary); }
        .hamburger.active .bar:nth-child(2) { opacity: 0; }
        .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); background-color: var(--velora-primary); }

        .mobile-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: var(--dark-bg);
            display: none;
            flex-direction: column;
            padding: 100px 8% 40px;
            z-index: 2500;
        }

        .mobile-nav.open { display: flex; }

        .menu-links {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-top: 40px;
        }

        .menu-links a {
            color: #fff;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 700;
            transition: color 0.3s;
        }
        .menu-links a:hover {
            color: var(--velora-primary);
        }

        .menu-auth {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            padding-bottom: 50px;
        }

        .login-link {
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .signup-btn-large {
            background: linear-gradient(135deg, var(--velora-primary), var(--velora-accent));
            color: #fff;
            text-decoration: none;
            width: 100%;
            padding: 20px;
            text-align: center;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 5%;
        }

        .signup-intro {
            margin-bottom: 40px;
        }

        .main-title {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 5px;
            background: linear-gradient(to right, #fff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            color: #a1a1aa;
        }

        .signup-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 50px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #a1a1aa;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: var(--glass);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            transition: 0.3s;
        }

        .input-group:focus-within {
            border-color: var(--velora-primary);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.2);
        }

        .input-icon {
            padding: 18px 0 18px 20px;
            color: #6b7280;
            font-size: 1.2rem;
        }

        .input-group input {
            flex-grow: 1;
            padding: 18px 20px;
            background-color: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            width: 100%;
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        /* CARD-STYLE SELECT LAYOUT */
        .plan-cards-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .plan-card {
            display: flex;
            align-items: center;
            background-color: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .plan-card:hover {
            background-color: rgba(255, 255, 255, 0.06);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .plan-card.active {
            background-color: rgba(99, 102, 241, 0.08);
            border-color: var(--velora-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
        }

        .plan-card-icon {
            font-size: 1.4rem;
            color: #6b7280;
            margin-right: 16px;
            width: 30px;
            text-align: center;
            transition: color 0.3s;
        }

        .plan-card.active .plan-card-icon {
            color: var(--velora-primary);
        }

        .plan-card-details {
            flex-grow: 1;
        }

        .plan-card-details h3 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
            margin-bottom: 2px;
        }

        .plan-save-tag {
            font-size: 0.75rem;
            color: #a1a1aa;
            font-weight: 500;
        }

        .plan-card.active .plan-save-tag {
            color: var(--velora-primary);
        }

        .plan-checkbox {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .plan-card.active .plan-checkbox {
            color: var(--velora-primary);
            transform: scale(1.1);
        }

        .velora-submit-btn {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--velora-primary), var(--velora-accent));
            color: #fff;
            border: none;
            padding: 18px 25px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            text-transform: uppercase;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .velora-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--velora-glow);
        }

        .btn-arrow-icon {
            font-size: 1.4rem;
        }

        .form-footer {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 60px;
        }

        .terms-text {
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .legal-link {
            color: var(--velora-primary);
            text-decoration: none;
            font-weight: bold;
        }

        .login-prompt {
            font-size: 0.95rem;
        }

        .login-action-link {
            color: #fff;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

    <script>
        const hamburger = document.getElementById('menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('open');
            document.body.style.overflow = mobileMenu.classList.contains('open') ? 'hidden' : 'auto';
        });
        const togglePassword = document.getElementById('togglePassword');
        const passwordField = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        togglePassword.addEventListener('click', function () {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            
            
            this.classList.toggle('text-info');
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        const planCards = document.querySelectorAll('.plan-card');
        const planTracker = document.getElementById('selected-plan-tracker');

        planCards.forEach(card => {
            card.addEventListener('click', () => {
                planCards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                
                const planValue = card.getAttribute('data-plan-value');
                planTracker.value = planValue;
            });
        });
        
        const signupForm = document.querySelector('.signup-form');
        signupForm.addEventListener('submit', (e) => {
            e.preventDefault(); 

            const usernameInput = document.getElementById('username').value;
            const fullNameInput = document.getElementById('full-name').value;
            const planInput = planTracker.value; 

            localStorage.setItem('velora_username', usernameInput);
            localStorage.setItem('velora_fullname', fullNameInput);
            localStorage.setItem('velora_selected_plan', planInput); 

            window.location.href = "dashboard.html"; 
        });
    </script>
</body>
</html>
