<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velora | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --velora-primary: #6366f1;
            --velora-accent: #a855f7;
            --velora-glow: rgba(99, 102, 241, 0.4);
            --dark-bg: #0b0a12;
            --card-bg: #141221;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-gray: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            min-height: 100vh;
            padding-bottom: 90px; /* Space for fixed bottom nav */
        }

        .dashboard-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        /* --- HEADER AREA --- */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .greeting-box .time-text {
            font-size: 0.9rem;
            color: var(--text-gray);
            font-weight: 500;
        }

        .greeting-box .user-name {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .icon-btn-link {
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            color: #fff;
            font-size: 1.1rem;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-btn-link:hover {
            border-color: var(--velora-primary);
            color: var(--velora-primary);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.3);
            transform: translateY(-2px);
        }

        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background-color: #ef4444;
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--dark-bg);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- MAIN WALLET CARD --- */
        .wallet-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #110f1c 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 25px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .wallet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .wallet-label {
            font-size: 0.85rem;
            color: #cbd5e1;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .plan-badge {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .wallet-balance {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .registration-date {
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-bottom: 20px;
        }

        /* Currency Selector */
        .currency-selector {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 5px;
            border-radius: 50px;
            width: fit-content;
            border: 1px solid var(--glass-border);
        }

        .currency-label {
            font-size: 0.75rem;
            color: var(--text-gray);
            padding-left: 10px;
            font-weight: 600;
        }

        .currency-tabs {
            display: flex;
            gap: 2px;
        }

        .currency-tab {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 50px;
            cursor: pointer;
            color: var(--text-gray);
            transition: 0.2s;
        }

        .currency-tab.active {
            background-color: #fff;
            color: #000;
        }

        /* --- NAVIGATION ACTION HUB GRID --- */
        .action-hub-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .action-card {
            text-decoration: none;
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            padding: 18px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .action-card:hover {
            border-color: var(--velora-primary);
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.15);
        }

        .action-icon-wrapper {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        /* Layout Accent Colors based on standard UX mapping */
        .action-card:nth-child(1) .action-icon-wrapper { background: rgba(234, 179, 8, 0.1); color: #eab308; } /* Loan */
        .action-card:nth-child(2) .action-icon-wrapper { background: rgba(99, 102, 241, 0.1); color: #6366f1; } /* V-AI */
        .action-card:nth-child(3) .action-icon-wrapper { background: rgba(168, 85, 247, 0.1); color: #a855f7; } /* Upgrade */
        .action-card:nth-child(4) .action-icon-wrapper { background: rgba(34, 197, 94, 0.1); color: #22c55e; } /* Withdraw */

        .action-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: #cbd5e1;
            letter-spacing: 0.3px;
        }

        /* --- STATS INFO SECTION --- */
        .info-cards-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .info-card {
            background-color: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .info-card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: var(--velora-primary);
            font-size: 1.1rem;
        }

        .info-card-label {
            font-size: 0.75rem;
            color: var(--text-gray);
            font-weight: bold;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .info-card-value {
            font-size: 1rem;
            font-weight: 700;
        }

        .status-active {
            color: #22c55e;
            font-weight: 700;
        }

        /* --- FLOATING ACTIONS CONTAINER --- */
        .floating-actions-container {
            position: fixed;
            bottom: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 999;
        }

        .floating-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: 0.3s;
            border: none;
            color: #fff;
        }

        .floating-btn:hover {
            transform: scale(1.08) translateY(-2px);
        }

        .gift-btn {
            background: linear-gradient(135deg, #22c55e, #06b6d4);
        }

        .chat-btn {
            background: linear-gradient(135deg, var(--velora-primary), var(--velora-accent));
        }

        /* --- FIXED BOTTOM NAVIGATION --- */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: rgba(11, 10, 18, 0.92);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            z-index: 1000;
        }

        .nav-item-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            transition: all 0.3s;
            flex-grow: 1;
        }

        .nav-item-link i {
            font-size: 1.2rem;
        }

        .nav-item-link span {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .nav-item-link.active {
            color: var(--velora-primary);
            text-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
        }

        .nav-item-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>

    <main class="dashboard-container">
        
        <!-- HEADER SECTION -->
        <header class="header-area">
            <div class="greeting-box">
                <div class="time-text" id="time-greeting">Good evening</div>
                <div class="user-name" id="display-name">Creator</div>
            </div>
            <div class="header-actions">
                <!-- Hyperlinked Notification Icon -->
                <a href="notifications.html" class="icon-btn-link" title="Notifications">
                    <i class="fa-regular fa-bell"></i>
                    <div class="notification-badge">1</div>
                </a>
                <!-- Hyperlinked Profile Icon -->
                <a href="profile.html" class="icon-btn-link" title="Profile Configuration">
                    <i class="fa-regular fa-user"></i>
                </a>
            </div>
        </header>

        <!-- BALANCE AND BLOCK LICENSE PROFILE CARD -->
        <section class="wallet-card">
            <div class="wallet-header">
                <span class="wallet-label">Available Balance</span>
                <span class="plan-badge" id="display-plan">Premium Plan</span>
            </div>
            <div class="wallet-balance" id="display-balance">₦14,500.00</div>
            <div class="registration-date" id="display-joined-date">Joined: June 25, 2026</div>

            <div class="currency-selector">
                <span class="currency-label">Select Currency</span>
                <div class="currency-tabs">
                    <div class="currency-tab active">NGN</div>
                    <div class="currency-tab">GHS</div>
                    <div class="currency-tab">XAF</div>
                </div>
            </div>
        </section>

        <!-- UTILITY CONTROL INFRASTRUCTURE GRID -->
        <nav class="action-hub-grid">
            <a href="loans.html" class="action-card">
                <div class="action-icon-wrapper">
                    <i class="fa-solid fa-hand-holding-dollar"></i>
                </div>
                <span class="action-title">Loan</span>
            </a>
            <a href="v-ai.html" class="action-card">
                <div class="action-icon-wrapper">
                    <i class="fa-solid fa-microchip"></i>
                </div>
                <span class="action-title">V-AI</span>
            </a>
            <a href="upgrade.html" class="action-card">
                <div class="action-icon-wrapper">
                    <i class="fa-solid fa-circle-up"></i>
                </div>
                <span class="action-title">Upgrade</span>
            </a>
            <a href="withdraw.html" class="action-card">
                <div class="action-icon-wrapper">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <span class="action-title">Withdraw</span>
            </a>
        </nav>

        <!-- ANALYTICAL PLACEMENT MATRIX DATA -->
        <section class="info-cards-row">
            <div class="info-card">
                <div class="info-card-header">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div class="info-card-label">Member Since</div>
                <div class="info-card-value" id="display-member-since">June 25, 2026</div>
                <div class="info-card-label" style="margin-top: 10px; font-size: 0.65rem;">Account Status</div>
                <div class="status-active" style="font-size: 0.85rem;">Account Verified</div>
            </div>

            <div class="info-card">
                <div class="info-card-header" style="color: #06b6d4;">
                    <i class="fa-solid fa-bolt"></i>
                </div>
                <div class="info-card-label">V-AI Status</div>
                <div class="info-card-value status-active">Online</div>
                <div class="info-card-label" style="margin-top: 10px; font-size: 0.65rem;">Engine Node</div>
                <div style="font-size: 0.85rem; color: var(--text-gray); font-weight: 600;">Active Matrix</div>
            </div>
        </section>

    </main>

    <!-- FLOATING PACK ACTIONS (Gift and Support Chat) -->
    <div class="floating-actions-container">
        <div class="floating-btn gift-btn" title="Claim Rewards Bundle" onclick="location.href='rewards.html'">
            <i class="fa-solid fa-gift"></i>
        </div>
        <div class="floating-btn chat-btn" title="Support Integration" onclick="location.href='support.html'">
            <i class="fa-regular fa-comment-dots"></i>
        </div>
    </div>

    <!-- BOTTOM FIXED ROUTER BAR NAVIGATION -->
    <nav class="bottom-nav-bar">
        <a href="dashboard.html" class="nav-item-link active">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item-link">
            <i class="fa-solid fa-microchip"></i>
            <span>V-AI</span>
        </a>
        <a href="loans.html" class="nav-item-link">
            <i class="fa-solid fa-hand-holding-dollar"></i>
            <span>Loans</span>
        </a>
        <a href="profile.html" class="nav-item-link">
            <i class="fa-solid fa-circle-user"></i>
            <span>Me</span>
        </a>
    </nav>

    <script>
        // Dynamic Setup Engine Execution
        document.addEventListener("DOMContentLoaded", () => {
            
            // 1. GREETING MANAGER BY TIME SEQUENCE
            const greetingElement = document.getElementById('time-greeting');
            const currentHour = new Date().getHours();
            
            if (currentHour >= 0 && currentHour < 12) {
                greetingElement.textContent = "Good morning";
            } else if (currentHour >= 12 && currentHour < 17) {
                greetingElement.textContent = "Good afternoon";
            } else {
                greetingElement.textContent = "Good evening";
            }

            // 2. USER DATA STORAGE PIPELINE INTERACTION
            const savedName = localStorage.getItem('velora_fullname') || "Nexora";
            const savedPlan = localStorage.getItem('velora_selected_plan') || "VELORA PREMIUM — ₦14,500";

            document.getElementById('display-name').textContent = savedName.split(' ')[0];

            // 3. ACCOUNT PLAN AND REWARD MATRIX MATCHING
            const balanceElement = document.getElementById('display-balance');
            const planElement = document.getElementById('display-plan');

            if (savedPlan.includes("PLATINUM")) {
                planElement.textContent = "Platinum Access";
                balanceElement.textContent = "₦8,000.00";
            } else {
                // Default fallback to Premium/Gold structural pricing rules
                planElement.textContent = "Premium Access";
                balanceElement.textContent = "₦12,000.00";
            }

            // 4. PERSISTENT REGISTRATION SEQUENCE TIMESTAMPS
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            const todayFormatted = new Date().toLocaleDateString('en-US', options);

            document.getElementById('display-joined-date').textContent = `Registered On: ${todayFormatted}`;
            document.getElementById('display-member-since').textContent = todayFormatted;
        });
    </script>
</body>
</html>
